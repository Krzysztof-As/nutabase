<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NutaBase - Zielony Ekran</title>
    <style>
        /* Stylizujemy wygląd strony */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }

        /* Tworzymy zielone tło na cały ekran */
        .background {
            background-color: #2ecc71; /* Przyjemna zieleń */
            height: 100vh;
            width: 100vw;
            display: flex;
            position: relative;
        }

        /* Stylizujemy przycisk wyjścia */
        .exit-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #e74c3c; /* Czerwony kolor */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .exit-button:hover {
            background-color: #c0392b; /* Ciemniejszy czerwony po najechaniu */
        }
    </style>
</head>
<body>

    <div class="background">
        <button class="exit-button" onclick="exitApp()">Wyjdź</button>
    </div>

    <script>
        // Funkcja, która wykona się po kliknięciu
        function exitApp() {
            alert("Dziękujemy za wizytę w NutaBase! (W prawdziwej aplikacji tutaj nastąpiłoby zamknięcie lub wylogowanie)");
        }
    </script>

</body>
</html>
