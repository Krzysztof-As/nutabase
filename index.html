<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutaBase - Twoja Muzyka</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .main-container {
            background-image: url('tlo_nutabase.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            height: 60px; 
            width: auto;
        }

        .exit-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .exit-button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="logo_nutabase.png" class="logo" alt="Logo NutaBase">

        <button class="exit-button" onclick="exitApp()">Wyjdź</button>
    </div>

    <script>
        function exitApp() {
            alert("Dziękujemy za wizytę w NutaBase!");
        }
    </script>

</body>
</html>
